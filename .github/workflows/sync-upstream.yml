name: 同步上游微软 winget-pkgs
# 定时每天8点自动执行，也支持手动点击触发
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取当前仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 绑定上游官方仓库
        run: git remote add upstream https://github.com/microsoft/winget-pkgs.git

      - name: 拉取上游全部更新，覆盖本地main分支
        run: |
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push origin main --force-with-lease

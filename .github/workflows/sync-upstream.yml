name: Sync winget-pkgs

on:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/microsoft/winget-pkgs.git || true

          git fetch upstream

          git checkout master

          git reset --hard upstream/master

          git push origin master --force
